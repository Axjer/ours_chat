<!doctype html>
<html class="light" lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Ours Chat</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💬</text></svg>"
    />
    <script src="https://cdn.tailwindcss.com?plugins=container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-primary-container": "#fffbff",
              background: "#f7f9fb",
              "surface-container-lowest": "#ffffff",
              "on-tertiary-fixed-variant": "#703700",
              "on-primary-fixed-variant": "#2f2ebe",
              "primary-fixed": "#e1e0ff",
              "surface-container-high": "#e6e8ea",
              "on-secondary": "#ffffff",
              error: "#ba1a1a",
              "primary-fixed-dim": "#c0c1ff",
              outline: "#767586",
              "on-error": "#ffffff",
              "secondary-container": "#fd56a7",
              primary: "#4648d4",
              "surface-bright": "#f7f9fb",
              "surface-container-low": "#f2f4f6",
              "on-background": "#191c1e",
              "on-primary-fixed": "#07006c",
              "inverse-surface": "#2d3133",
              "tertiary-fixed": "#ffdcc5",
              tertiary: "#904900",
              "outline-variant": "#c7c4d7",
              "tertiary-container": "#b55d00",
              secondary: "#b4136d",
              "on-secondary-container": "#600037",
              "error-container": "#ffdad6",
              "inverse-primary": "#c0c1ff",
              "surface-container": "#eceef0",
              "tertiary-fixed-dim": "#ffb783",
              "on-error-container": "#93000a",
              "surface-dim": "#d8dadc",
              "on-tertiary-container": "#fffbff",
              "secondary-fixed": "#ffd9e4",
              "on-tertiary-fixed": "#301400",
              "on-tertiary": "#ffffff",
              "on-surface": "#191c1e",
              "on-surface-variant": "#464554",
              "on-secondary-fixed-variant": "#8c0053",
              "surface-variant": "#e0e3e5",
              "secondary-fixed-dim": "#ffb0cd",
              "surface-container-highest": "#e0e3e5",
              "on-primary": "#ffffff",
              "inverse-on-surface": "#eff1f3",
              surface: "#f7f9fb",
              "on-secondary-fixed": "#3e0022",
              "primary-container": "#6063ee",
              "surface-tint": "#494bd6",
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
            spacing: {
              xs: "4px",
              sm: "8px",
              md: "16px",
              xl: "32px",
              unit: "4px",
              lg: "24px",
              gutter: "16px",
              "container-padding": "24px",
            },
            fontFamily: {
              "label-md": ["Manrope"],
              "headline-xl": ["Manrope"],
              "body-md": ["Manrope"],
              "body-sm": ["Manrope"],
              "headline-lg": ["Manrope"],
            },
            fontSize: {
              "label-md": [
                "12px",
                {
                  lineHeight: "16px",
                  letterSpacing: "0.05em",
                  fontWeight: "600",
                },
              ],
              "headline-xl": [
                "32px",
                {
                  lineHeight: "40px",
                  letterSpacing: "-0.02em",
                  fontWeight: "700",
                },
              ],
              "body-md": [
                "16px",
                { lineHeight: "24px", letterSpacing: "0em", fontWeight: "400" },
              ],
              "body-sm": [
                "14px",
                { lineHeight: "20px", letterSpacing: "0em", fontWeight: "400" },
              ],
              "headline-lg": [
                "24px",
                {
                  lineHeight: "32px",
                  letterSpacing: "-0.01em",
                  fontWeight: "600",
                },
              ],
            },
          },
        },
      };
    </script>

    <link rel="stylesheet" href="login.css" />
  </head>

  <body
    class="bg-surface min-h-screen font-body-md relative overflow-hidden"
    id="app-background"
  >
    <div class="fixed inset-0 pointer-events-none z-0">
      <div
        class="absolute top-[-10%] left-[-5%] w-[40%] h-[40%] rounded-full bg-primary/20 blur-[120px]"
      ></div>

      <div class="fixed bottom-4 left-0 w-full pointer-events-none z-40 h-24">
        <div
          id="running-cat"
          class="absolute bottom-0 drop-shadow-lg origin-bottom"
          style="left: 0; transform: translateX(200px) scaleX(1)"
        >
          <div class="pet-icon leading-none mb-1">
            <img
              src="woo_transparent.gif"
              alt="woo dog"
              class="w-24 h-24 object-cover"
              style="clip-path: inset(15% 0 0 0)"
            />
          </div>
        </div>
      </div>
    </div>
    <div class="relative z-10 flex min-h-screen">
      <section
        class="hidden lg:flex lg:w-1/2 items-center justify-center p-12 relative"
      >
        <div class="max-w-xl text-left space-y-8">
          <div
            class="relative inline-flex items-center justify-center w-20 h-20 rounded-3xl bg-primary text-white mb-4 shadow-2xl shadow-primary/30"
          >
            <!-- 坐在對話框上的貓咪 -->
            <img
              src="1280_transparent.gif"
              alt="sitting cat"
              class="absolute left-1/2 -translate-x-1/2 -top-10 w-20 h-20 object-contain z-10 drop-shadow-lg"
            />
            <span
              class="material-symbols-outlined text-5xl"
              data-icon="forum"
              style="font-variation-settings: &quot;FILL&quot; 1"
              >forum</span
            >
          </div>
          <div class="space-y-4">
            <h1
              class="font-headline-xl text-[64px] leading-none text-primary tracking-tighter"
            >
              Ours Chat
            </h1>
            <p
              class="text-headline-lg text-on-surface-variant font-medium leading-relaxed"
            >
              與朋友隨時隨地保持聯繫，<br />享受純粹、流暢的對話體驗。
            </p>
          </div>
        </div>
      </section>
      <main
        class="w-full lg:w-1/2 flex items-center justify-center p-6 lg:p-12 xl:pr-24"
      >
        <div class="relative w-full max-w-md">
          <!-- 電腦版：像貓咪一樣趴在登入卡片 (div) 框線最上方 -->
          <img
            src="200w.gif"
            alt="mascot"
            class="hidden lg:block absolute left-1/2 -translate-x-1/2 -top-[55px] w-20 h-20 object-contain z-50 drop-shadow-lg"
          />

          <div
            class="glass-panel w-full rounded-[32px] p-8 md:p-12 shadow-[0_32px_64px_-12px_rgba(0,0,0,0.1)] flex flex-col items-center"
            data-purpose="login-card"
          >
            <div class="mb-10 text-center lg:hidden">
              <div
                class="relative inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-primary text-white mb-6 shadow-xl shadow-primary/20"
              >
                <!-- 手機版：坐在對話框上的貓咪 -->
                <img
                  src="1280_transparent.gif"
                  alt="sitting cat"
                  class="absolute left-1/2 -translate-x-1/2 -top-8 w-16 h-16 object-contain z-10 drop-shadow-lg"
                />
                <span
                  class="material-symbols-outlined text-4xl"
                  data-icon="forum"
                  style="font-variation-settings: &quot;FILL&quot; 1"
                  >forum</span
                >
              </div>
              <h1
                class="font-headline-xl text-headline-xl text-primary tracking-tighter mb-2"
              >
                Ours Chat
              </h1>
            </div>
            <div class="hidden lg:block mb-8 text-center w-full">
              <h2
                class="font-headline-lg text-headline-lg text-on-surface mb-2"
              >
                歡迎回來
              </h2>
              <p class="text-body-sm text-on-surface-variant">
                請登入您的帳號開始聊天
              </p>
            </div>
            <div class="w-full space-y-6">
              <div class="space-y-4">
                <div class="space-y-2">
                  <label
                    class="font-label-md text-label-md text-on-surface-variant ml-1"
                    for="name-input"
                    >使用者</label
                  >
                  <div class="relative group rounded-xl overflow-hidden">
                    <span
                      class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant/50 transition-colors group-focus-within:text-primary z-10"
                      data-icon="person"
                      >person</span
                    >
                    <input
                      class="w-full bg-gradient-to-b from-white/40 to-white/60 border-none rounded-xl py-4 pl-12 pr-4 shadow-[inset_0_2px_4px_rgba(0,0,0,0.06),0_1px_2px_rgba(0,0,0,0.05)] focus:bg-white/80 focus:ring-2 focus:ring-primary/40 focus:shadow-[inset_0_2px_4px_rgba(0,0,0,0.02),0_4px_12px_rgba(70,72,212,0.15)] outline-none transition-all font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/40"
                      id="name-input"
                      placeholder="輸入使用者名稱"
                      type="text"
                      autocomplete="off"
                      onkeydown="if (event.key === 'Enter') joinChat();"
                    />
                  </div>
                </div>
                <div class="space-y-2">
                  <label
                    class="font-label-md text-label-md text-on-surface-variant ml-1"
                    for="password-input"
                    >密碼</label
                  >
                  <div class="relative group rounded-xl overflow-hidden">
                    <span
                      class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant/50 transition-colors group-focus-within:text-primary z-10"
                      data-icon="lock"
                      >lock</span
                    >
                    <input
                      class="password-mask w-full bg-gradient-to-b from-white/40 to-white/60 border-none rounded-xl py-4 pl-12 pr-4 shadow-[inset_0_2px_4px_rgba(0,0,0,0.06),0_1px_2px_rgba(0,0,0,0.05)] focus:bg-white/80 focus:ring-2 focus:ring-primary/40 focus:shadow-[inset_0_2px_4px_rgba(0,0,0,0.02),0_4px_12px_rgba(70,72,212,0.15)] outline-none transition-all font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/40"
                      id="password-input"
                      placeholder="••••••••"
                      type="text"
                      autocomplete="off"
                      onkeydown="if (event.key === 'Enter') joinChat();"
                    />
                  </div>
                </div>
              </div>
              <div class="space-y-4">
                <button
                  class="w-full bg-primary text-on-primary font-headline-lg text-body-md py-4 rounded-xl shadow-lg shadow-primary/30 hover:shadow-primary/40 hover:-translate-y-0.5 active:scale-95 transition-all flex items-center justify-center gap-2"
                  onclick="joinChat()"
                >
                  登入
                  <span
                    class="material-symbols-outlined text-xl"
                    data-icon="login"
                    >login</span
                  >
                </button>
                <div class="text-center">
                  <p class="text-body-sm text-on-surface-variant">
                    還沒有帳號嗎？
                    <button
                      class="text-primary font-bold hover:underline focus:outline-none transition-all"
                      onclick="createAccount()"
                    >
                      新增帳號
                    </button>
                  </p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script src="login.js"></script>
  </body>
</html>
